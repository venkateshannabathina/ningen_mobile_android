<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixie</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0f;
        }
        #app {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="js-probe"
        style="position:fixed;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:#ef4444;z-index:9999;pointer-events:none;">
    </div>
    <div id="app"></div>

    <!-- Three.js + @pixiv/three-vrm bundle -->
    <script src="vrm-bundle.js"></script>
    <!-- Injected globals -->
    <script>
        window.__creatorUri = 'creator.png';
        window.__backgroundUri = 'background.png';
    </script>
    <!-- Main Pixie logic (Android-adapted) -->
    <script src="main.js"></script>
</body>

</html>
